<template>
    <lightning-card title="Fee Dashboard" icon-name="standard:account">

        <template if:true={fees}>
            <lightning-datatable
                key-field="Id"
                data={fees}
                columns={columns}
                hide-checkbox-column>
            </lightning-datatable>
        </template>

        <template if:true={error}>
            <div class="slds-text-color_error slds-p-around_medium">
                {error}
            </div>
        </template>

    </lightning-card>
</template>
